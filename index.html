<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Luna Driver</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root{--primary:#10b981;--dark:#1e293b;--bg:#f8fafc;--text-gray:#64748b;--border:#e2e8f0}
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
    body{background:var(--bg);height:100vh;overflow:hidden}
    .login-screen{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px}
    .login-screen.hidden{display:none}
    .login-logo{font-size:32px;color:var(--primary);font-weight:700;margin-bottom:25px;text-align:center}
    .login-logo i{font-size:48px;background:var(--bg);padding:20px;border-radius:50%;margin-bottom:10px}
    .login-form{width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px}
    .login-input{width:100%;padding:15px;border:1px solid var(--border);border-radius:12px;font-size:15px;outline:none;background:var(--bg)}
    .btn-login{width:100%;padding:15px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer}
    .auth-switch{text-align:center;font-size:14px;color:var(--text-gray);margin-top:4px}.auth-switch span{color:var(--primary);font-weight:700;cursor:pointer}
    .main-app{display:flex;flex-direction:column;height:100vh;width:100%}
    .driver-header{background:#fff;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;z-index:1000;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .status-toggle{display:flex;align-items:center;gap:10px;background:var(--bg);padding:8px 16px;border-radius:20px;font-weight:600;cursor:pointer;border:none}
    .status-toggle.online{background:#d1fae5;color:var(--primary)}.status-indicator{width:12px;height:12px;border-radius:50%;background:#ccc}.status-toggle.online .status-indicator{background:var(--primary);box-shadow:0 0 8px var(--primary)}
    #map{flex:1;width:100%;z-index:1}
    .bottom-panel{background:#fff;padding:16px;border-radius:20px 20px 0 0;box-shadow:0 -4px 15px rgba(0,0,0,.08);z-index:1000;max-height:350px;overflow:auto}
    .location-text{font-size:14px;color:var(--text-gray);margin-bottom:12px;line-height:1.5}
    .order-card{background:#f8fafc;border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
    .order-title{font-weight:700;margin-bottom:8px;color:var(--dark)}.order-text{font-size:13px;color:var(--text-gray);margin-bottom:5px;line-height:1.4}
    .btn-ambil{width:100%;margin-top:10px;padding:12px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-weight:700;cursor:pointer}
    .empty{font-size:13px;color:var(--text-gray);background:#f1f5f9;border-radius:12px;padding:12px;text-align:center}
  </style>
</head>
<body>
  <div class="login-screen" id="loginScreen">
    <div class="login-logo"><i class="fa-solid fa-motorcycle"></i><br>Luna Driver</div>
    <div class="login-form">
      <input type="text" id="driverNameInput" class="login-input" placeholder="Nama Driver" style="display:none;">
      <input type="text" id="phoneInput" class="login-input" placeholder="Nomor HP">
      <input type="password" id="passwordInput" class="login-input" placeholder="Password">
      <input type="text" id="vehicleInput" class="login-input" placeholder="Kendaraan, contoh: Motor" style="display:none;">
      <input type="text" id="plateInput" class="login-input" placeholder="Plat nomor, contoh: Z 1234 AB" style="display:none;">
      <button type="button" class="btn-login" onclick="authDriver()" id="authBtn">Masuk</button>
      <div class="auth-switch"><span id="switchText">Belum punya akun?</span><span onclick="toggleAuthDriver()" id="switchBtn"> Daftar</span></div>
    </div>
  </div>

  <div class="main-app">
    <div class="driver-header"><h3 id="headerTitle">Luna Driver</h3><button type="button" class="status-toggle" id="statusBtn" onclick="toggleOnline()"><span class="status-indicator"></span><span id="statusText">Offline</span></button></div>
    <div id="map"></div>
    <div class="bottom-panel"><div class="location-text" id="locationText">Login terlebih dahulu untuk menerima order.</div><div id="ordersContainer"><div class="empty">Belum ada order masuk.</div></div></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let map,driverMarker,currentLat=-6.914744,currentLng=107.609810,isOnline=false,watchId=null,mapStarted=false,isRegister=false,lastOrderIds={};
    let driverData={name:"Driver Luna",phone:"",vehicle:"",plate:""};

    function playSound(type){
      try{
        const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
        const osc=audioCtx.createOscillator(); const gain=audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value=type==="order"?740:type==="success"?880:520;
        gain.gain.setValueAtTime(0.18,audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);
        osc.start(); osc.stop(audioCtx.currentTime+0.4);
      }catch(e){console.log(e)}
    }
    function bersihkanNomorHP(phone){return phone.replace(/\D/g,"")}
    function toggleAuthDriver(){isRegister=!isRegister;document.getElementById("driverNameInput").style.display=isRegister?"block":"none";document.getElementById("vehicleInput").style.display=isRegister?"block":"none";document.getElementById("plateInput").style.display=isRegister?"block":"none";document.getElementById("authBtn").innerText=isRegister?"Daftar Driver":"Masuk";document.getElementById("switchText").innerText=isRegister?"Sudah punya akun?":"Belum punya akun?";document.getElementById("switchBtn").innerText=isRegister?" Masuk":" Daftar"}
    function authDriver(){
      const name=document.getElementById("driverNameInput").value.trim();
      const phone=bersihkanNomorHP(document.getElementById("phoneInput").value.trim());
      const password=document.getElementById("passwordInput").value.trim();
      const vehicle=document.getElementById("vehicleInput").value.trim();
      const plate=document.getElementById("plateInput").value.trim();
      if(phone===""||password===""){alert("Nomor HP dan password wajib diisi.");return}
      if(typeof window.daftarDriver!=="function"||typeof window.loginDriver!=="function"){alert("Firebase belum siap. Refresh halaman.");return}
      if(isRegister){
        if(name===""||vehicle===""||plate===""){alert("Nama, kendaraan, dan plat nomor wajib diisi.");return}
        window.daftarDriver(name,phone,password,vehicle,plate).then(()=>{playSound("success");alert("Daftar driver berhasil. Silakan masuk.");toggleAuthDriver()}).catch(error=>alert("Gagal daftar: "+error.message));
        return;
      }
      window.loginDriver(phone,password).then(user=>{driverData=user;masukAplikasiDriver()}).catch(error=>alert("Gagal masuk: "+error.message));
    }
    function masukAplikasiDriver(){document.getElementById("loginScreen").classList.add("hidden");document.getElementById("headerTitle").innerText=driverData.name||"Luna Driver";setTimeout(()=>{if(!mapStarted){initMap();startTrackingLocation();mapStarted=true}},300)}
    function initMap(){map=L.map("map").setView([currentLat,currentLng],16);L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(map);const driverIcon=L.divIcon({html:`<div style="width:42px;height:42px;background:#10b981;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;border:4px solid white;box-shadow:0 4px 12px rgba(0,0,0,.25);"><i class="fa-solid fa-motorcycle"></i></div>`,className:"",iconSize:[42,42],iconAnchor:[21,21]});driverMarker=L.marker([currentLat,currentLng],{icon:driverIcon}).addTo(map)}
    function startTrackingLocation(){if(!navigator.geolocation){document.getElementById("locationText").innerText="Browser tidak mendukung GPS.";return}watchId=navigator.geolocation.watchPosition(position=>{currentLat=position.coords.latitude;currentLng=position.coords.longitude;if(driverMarker)driverMarker.setLatLng([currentLat,currentLng]);if(isOnline&&map)map.setView([currentLat,currentLng],16);document.getElementById("locationText").innerHTML=`Driver: <b>${driverData.name||"-"}</b><br>Kendaraan: ${driverData.vehicle||"-"} • ${driverData.plate||"-"}<br>Lokasi: ${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}`;if(typeof window.updateLokasiDriverKeFirebase==="function")window.updateLokasiDriverKeFirebase(driverData,currentLat,currentLng,isOnline)},error=>{let msg="Gagal mengambil lokasi driver.";if(error.code===1)msg="Izin lokasi ditolak.";if(error.code===2)msg="GPS/lokasi tidak tersedia.";if(error.code===3)msg="Pengambilan lokasi terlalu lama.";document.getElementById("locationText").innerText=msg},{enableHighAccuracy:true,maximumAge:0,timeout:10000})}
    function toggleOnline(){isOnline=!isOnline;const statusBtn=document.getElementById("statusBtn"),statusText=document.getElementById("statusText");if(isOnline){statusBtn.classList.add("online");statusText.innerText="Online";if(map)map.setView([currentLat,currentLng],16)}else{statusBtn.classList.remove("online");statusText.innerText="Offline"}if(typeof window.updateLokasiDriverKeFirebase==="function"&&driverData.phone)window.updateLokasiDriverKeFirebase(driverData,currentLat,currentLng,isOnline)}
    window.addEventListener("beforeunload",()=>{if(watchId!==null)navigator.geolocation.clearWatch(watchId)})
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, get, child } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    
const firebaseConfig = {
  apiKey: "AIzaSyAPmHTjD7HvqQALbegPVBDEE8utz6wqb7o",
  authDomain: "luna-ride-projek.firebaseapp.com",
  databaseURL: "https://luna-ride-projek-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "luna-ride-projek",
  storageBucket: "luna-ride-projek.firebasestorage.app",
  messagingSenderId: "350029772655",
  appId: "1:350029772655:web:5da8abdc58810dac3f5a9a"
};

    const app=initializeApp(firebaseConfig);const db=getDatabase(app);

    window.daftarDriver=function(name,phone,password,vehicle,plate){
      return get(child(ref(db),"users/drivers/"+phone)).then(snapshot=>{
        if(snapshot.exists())throw new Error("Nomor HP sudah terdaftar sebagai driver.");
        return set(ref(db,"users/drivers/"+phone),{name,phone,password,vehicle,plate,role:"driver",createdAt:Date.now()});
      });
    };
    window.loginDriver=function(phone,password){
      return get(child(ref(db),"users/drivers/"+phone)).then(snapshot=>{
        if(!snapshot.exists())throw new Error("Akun driver belum terdaftar.");
        const user=snapshot.val();
        if(user.password!==password)throw new Error("Password salah.");
        return user;
      });
    };
    window.updateLokasiDriverKeFirebase=function(driver,lat,lng,online){
      if(!driver||!driver.phone)return Promise.resolve();
      return set(ref(db,"drivers/"+driver.phone),{name:driver.name||"Driver Luna",phone:driver.phone,vehicle:driver.vehicle||"-",plate:driver.plate||"-",lat,lng,online,updatedAt:Date.now()}).catch(console.error);
    };

    const ordersRef=ref(db,"orders");
    onValue(ordersRef,snapshot=>{
      const data=snapshot.val(); const container=document.getElementById("ordersContainer");
      container.innerHTML="";
      if(!data){container.innerHTML='<div class="empty">Belum ada order masuk.</div>';return}
      let adaOrder=false;
      Object.entries(data).reverse().forEach(([id,order])=>{
        if(!order||order.status!=="menunggu_driver")return;
        adaOrder=true;
        if(!lastOrderIds[id]){lastOrderIds[id]=true; if(isOnline)playSound("order");}
        const card=document.createElement("div"); card.className="order-card";
        card.innerHTML=`<div class="order-title">Order Baru</div><div class="order-text">Nama: ${order.customerName||"-"}</div><div class="order-text">HP: ${order.customerPhone||"-"}</div><div class="order-text">Jarak: ${order.jarakKm||"-"} km</div><div class="order-text">Tarif: ${order.tarifText||"-"}</div><div class="order-text">Waktu: ${order.waktu||"-"}</div><button type="button" class="btn-ambil">Ambil Order</button>`;
        card.querySelector(".btn-ambil").onclick=()=>{
          if(!isOnline){alert("Aktifkan status Online dulu sebelum ambil order.");return}
          update(ref(db,"orders/"+id),{status:"driver_menuju_penumpang",driverId:driverData.phone||"",driverName:driverData.name||"Driver Luna",driverPhone:driverData.phone||"",driverVehicle:driverData.vehicle||"-",driverPlate:driverData.plate||"-",driverLat:currentLat,driverLng:currentLng,acceptedAt:Date.now()}).then(()=>{playSound("success");alert("Order berhasil diambil!")}).catch(err=>alert("Gagal ambil order: "+err.message));
        };
        container.appendChild(card);
      });
      if(!adaOrder)container.innerHTML='<div class="empty">Belum ada order masuk.</div>';
    });
  </script>
</body>
</html>
